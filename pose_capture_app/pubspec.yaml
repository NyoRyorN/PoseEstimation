name: pose_capture_app
description: Flutter app for real-time pose capture and CSV recording.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  csv: ^6.0.0
  google_mlkit_pose_detection: ^0.14.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.0
  share_plus: ^10.1.4
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
