<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101314" />
    <title>Audio Scope</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="scope-surface" aria-label="Realtime audio signal plot">
        <header class="top-bar">
          <div class="brand-block">
            <h1>Audio Scope</h1>
            <p id="statusText">マイク待機中</p>
          </div>

          <div class="meter-stack" aria-label="Input level">
            <div class="meter-row">
              <span>RMS</span>
              <strong id="rmsValue">-∞ dB</strong>
            </div>
            <div class="level-track">
              <span id="rmsBar" class="level-fill"></span>
            </div>
            <div class="meter-row">
              <span>Peak</span>
              <strong id="peakValue">0.000</strong>
            </div>
            <div class="level-track peak-track">
              <span id="peakBar" class="level-fill"></span>
            </div>
          </div>
        </header>

        <div class="plot-grid">
          <section class="plot-panel waveform-panel" aria-label="Waveform">
            <div class="plot-header">
              <span>Waveform</span>
              <strong id="windowValue">-- ms</strong>
            </div>
            <canvas id="waveformCanvas"></canvas>
          </section>

          <section class="plot-panel spectrum-panel" aria-label="Spectrum">
            <div class="plot-header">
              <span>Spectrum</span>
              <strong id="dominantFrequency">-- Hz</strong>
            </div>
            <canvas id="spectrumCanvas"></canvas>
          </section>
        </div>

        <footer class="control-dock">
          <button id="startButton" class="primary-button" type="button">
            <span class="record-symbol" aria-hidden="true"></span>
            <span>開始</span>
          </button>
          <button id="pauseButton" class="icon-button" type="button" disabled title="一時停止" aria-label="一時停止">
            <span id="pauseIcon" aria-hidden="true">Ⅱ</span>
          </button>
          <button id="stopButton" class="icon-button" type="button" disabled title="停止" aria-label="停止">
            <span aria-hidden="true">■</span>
          </button>

          <label class="control-field">
            <span>Gain</span>
            <input id="gainSlider" type="range" min="0.5" max="4" step="0.1" value="1.4" />
          </label>

          <label class="control-field compact-field">
            <span>Detail</span>
            <select id="fftSizeSelect">
              <option value="1024">Fast</option>
              <option value="2048" selected>Normal</option>
              <option value="4096">Fine</option>
              <option value="8192">Deep</option>
            </select>
          </label>

          <div class="sample-chip">
            <span>Rate</span>
            <strong id="sampleRateValue">-- Hz</strong>
          </div>
        </footer>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
